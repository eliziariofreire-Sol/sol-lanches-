<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado - JV Lanches</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center">
    <div class="max-w-md mx-auto text-center px-6">
        <div class="text-8xl mb-8">🎉</div>
        <h1 class="text-5xl font-bold mb-4">Pedido Confirmado!</h1>
        <p class="text-emerald-400 text-2xl mb-8">Obrigado, {{ nome }}!</p>

        <div class="bg-zinc-900 rounded-3xl p-10 my-12">
            <p class="text-zinc-400">Número do seu pedido</p>
            <p class="text-6xl font-mono font-bold text-emerald-400 mt-2">#{{ pedido_id }}</p>
        </div>

        <div class="text-zinc-400 mb-10">
            <p>Total: <span class="text-white font-bold">R$ {{ total|round(2) }}</span></p>
            <p class="mt-6">Seu pedido está sendo preparado.</p>
            <p class="text-emerald-400 mt-2">Tempo estimado: 25-35 minutos</p>
        </div>

        <a href="/cardapio" 
           class="inline-block bg-emerald-500 text-black font-bold px-12 py-5 rounded-3xl hover:bg-emerald-600 transition">
            Fazer Novo Pedido
        </a>
    </div>
</body>
</html>
