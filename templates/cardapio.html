<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>JV Lanches</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-950 text-white">

<!-- NAV -->
<nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="text-4xl">🍔</div>
            <h1 class="text-3xl font-bold">JV LANCHES</h1>
        </div>

        <a href="/carrinho"
           class="flex items-center gap-3 bg-emerald-500 text-black px-6 py-3 rounded-2xl font-bold">
            🛒 Carrinho (<span id="cart-count">0</span>)
        </a>
    </div>
</nav>

<!-- CONTEÚDO -->
<div class="max-w-7xl mx-auto px-6 py-12">

    <h2 class="text-3xl font-bold mb-10">Nosso Cardápio</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">

        {% for item in itens %}
        <div class="bg-zinc-900 rounded-3xl overflow-hidden hover:scale-105 transition">

            <img src="{{ item.imagem }}" class="w-full h-64 object-cover">

            <div class="p-8">
                <h3 class="text-2xl font-bold">{{ item.nome }}</h3>
                <p class="text-zinc-400 mt-3">{{ item.descricao }}</p>

                <div class="flex justify-between items-end mt-8">
                    <span class="text-3xl font-bold text-emerald-400">
                        R$ {{ "%.2f"|format(item.preco) }}
                    </span>

                    <button onclick="addCarrinho({{ item.id }})"
                        class="bg-emerald-500 hover:bg-emerald-600 text-black px-6 py-3 rounded-xl font-bold">
                        Adicionar
                    </button>
                </div>
            </div>

        </div>
        {% endfor %}

    </div>
</div>

<!-- TOAST -->
<div id="toast"
class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-emerald-500 text-black px-6 py-3 rounded-xl hidden">
Item adicionado!
</div>

<script>
function addCarrinho(id){
    fetch('/api/adicionar', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({item_id:id})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("cart-count").innerText = data.total_itens

        let toast = document.getElementById("toast")
        toast.classList.remove("hidden")

        setTimeout(()=>{
            toast.classList.add("hidden")
        }, 1500)
    })
}
</script>

</body>
</html>
